<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#06111f">
  <title>Jarvie - GitHub verbunden</title>
  <style>
    :root{
      --bg:#06111f; --card:#0b1b2e; --card2:#10253d; --line:#1d4165; --text:#e8f4ff;
      --muted:#91acd0; --accent:#47d6ff; --good:#3cf0a2; --warn:#ffd46b; --bad:#ff668a;
      --shadow:0 20px 60px rgba(0,0,0,.38);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at 50% -10%,#123a62 0,#06111f 52%,#03070d 100%);color:var(--text);overflow:hidden}
    button,input,textarea,select{font:inherit}
    button{border:0;border-radius:16px;padding:12px 14px;background:linear-gradient(135deg,#1f76a4,#24c7f7);color:white;font-weight:800;box-shadow:0 10px 30px rgba(36,199,247,.18);touch-action:manipulation}
    button.secondary{background:#132a45;color:#dcecff;border:1px solid #2a5c8f;box-shadow:none}
    button.danger{background:#5d1630;border:1px solid #a22954;box-shadow:none}
    button.good{background:#11523d;border:1px solid #2bc883;box-shadow:none}
    button.small{padding:8px 10px;border-radius:12px;font-size:13px}
    input,textarea,select{width:100%;background:#061424;border:1px solid #2b5682;border-radius:14px;color:var(--text);padding:12px;outline:none}
    textarea{min-height:90px;resize:vertical}
    .app{height:100%;display:grid;grid-template-columns:minmax(330px,440px) 1fr;gap:12px;padding:12px}
    .panel{background:linear-gradient(180deg,rgba(11,27,46,.96),rgba(6,15,27,.96));border:1px solid rgba(71,214,255,.22);border-radius:28px;box-shadow:var(--shadow);overflow:hidden;min-height:0}
    .left{display:flex;flex-direction:column;align-items:center;padding:18px;position:relative}
    .topline{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:10px}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--bad);box-shadow:0 0 20px var(--bad)}
    .dot.on{background:var(--good);box-shadow:0 0 20px var(--good)}
    .name{font-weight:900;font-size:22px;letter-spacing:.3px}
    .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .faceWrap{width:min(78vw,300px);height:min(78vw,300px);max-height:300px;position:relative;margin:8px auto 12px;border-radius:40px;background:radial-gradient(circle at 50% 38%,rgba(71,214,255,.22),transparent 50%),linear-gradient(145deg,#0d2741,#071426);border:1px solid rgba(71,214,255,.25);display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 60px rgba(71,214,255,.08),0 20px 80px rgba(0,0,0,.3)}
    .ring{position:absolute;inset:18px;border-radius:50%;border:1px solid rgba(71,214,255,.3);box-shadow:0 0 40px rgba(71,214,255,.15);animation:spin 9s linear infinite}
    .ring:before,.ring:after{content:"";position:absolute;border-radius:50%;border:1px dashed rgba(60,240,162,.26)}
    .ring:before{inset:18px;animation:spin 7s linear infinite reverse}.ring:after{inset:40px;animation:spin 11s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .face{position:relative;width:190px;height:190px;border-radius:50%;background:radial-gradient(circle at 45% 35%,#2de4ff,#1471a3 42%,#0a2c52 72%);box-shadow:0 0 50px rgba(71,214,255,.45)}
    .eye{position:absolute;top:65px;width:38px;height:18px;border-radius:20px;background:#dff9ff;box-shadow:0 0 18px rgba(255,255,255,.8);animation:blink 5.2s infinite}
    .eye.l{left:48px}.eye.r{right:48px}
    @keyframes blink{0%,96%,100%{transform:scaleY(1)}97%,99%{transform:scaleY(.08)}}
    .mouth{position:absolute;left:50%;bottom:52px;transform:translateX(-50%);width:70px;height:16px;border-radius:0 0 45px 45px;background:#021321;border:2px solid rgba(223,249,255,.75);box-shadow:0 0 18px rgba(255,255,255,.28)}
    .speaking .mouth{animation:talk .23s infinite alternate}.listeningFace .mouth{height:10px;width:54px}.thinking .eye{background:#ffe28b}.happy .eye{background:#b8ffe3}.warnFace .eye{background:#ff9db5}
    @keyframes talk{from{height:8px;width:44px}to{height:30px;width:78px}}
    .statusText{text-align:center;font-weight:800;font-size:18px;min-height:28px}.statusSub{text-align:center;color:var(--muted);font-size:13px;min-height:38px;line-height:1.35}
    .meter{width:100%;height:12px;background:#071322;border-radius:20px;border:1px solid #1e4266;overflow:hidden;margin:8px 0 12px}.meter>div{height:100%;width:0;background:linear-gradient(90deg,#3cf0a2,#47d6ff,#ffd46b);transition:width .08s linear}
    .buttons{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0}.buttons .wide{grid-column:1/-1}
    .liveBox{width:100%;background:rgba(6,20,36,.72);border:1px solid #244c75;border-radius:18px;padding:12px;margin-top:8px;min-height:82px}.label{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}.heard{font-size:17px;line-height:1.35;word-break:break-word}.hint{font-size:12px;color:var(--muted);line-height:1.35;margin-top:10px}
    .right{display:flex;flex-direction:column;min-height:0}.tabs{display:flex;gap:8px;padding:12px;border-bottom:1px solid rgba(71,214,255,.16);overflow:auto}.tab{background:#0c2036;border:1px solid #25517d;color:#dcecff;white-space:nowrap}.tab.active{background:linear-gradient(135deg,#1f76a4,#24c7f7)}
    .content{flex:1;overflow:auto;padding:14px;min-height:0}.card{background:rgba(11,28,48,.75);border:1px solid rgba(71,214,255,.16);border-radius:20px;padding:14px;margin-bottom:12px}.card h3{margin:0 0 8px;font-size:16px}.muted{color:var(--muted)}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.stack{display:grid;gap:10px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid #2b5682;background:#08182a;border-radius:999px;padding:6px 9px;font-size:12px;color:#cfe8ff;margin:3px}.log{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#050f1a;border:1px solid #1f4267;border-radius:14px;padding:10px;white-space:pre-wrap;overflow:auto;max-height:260px;color:#dcecff}.note{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.note b{color:#9ae9ff}.dangerText{color:#ff9db5}.goodText{color:#80ffc8}.warnText{color:#ffd46b}.fullscreen .app{display:block}.fullscreen .left{display:none}.fullscreen .right{height:100%}.fullscreen .right.panel{height:calc(100vh - 24px)}
    .kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#071322;border:1px solid #244c75;border-radius:8px;padding:2px 6px;color:#dff9ff}.imageOut{max-width:100%;border-radius:16px;border:1px solid #2b5682;margin-top:10px}.loader{display:inline-block;width:14px;height:14px;border:2px solid #2b5682;border-top-color:#47d6ff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px;margin-right:6px}
    @media (max-width:820px){body{overflow:auto}.app{height:auto;min-height:100%;display:block;padding:8px}.panel{border-radius:22px}.left{min-height:100svh}.right{min-height:90svh;margin-top:10px}.row,.row3{grid-template-columns:1fr}.faceWrap{width:min(86vw,280px);height:min(86vw,280px)}.buttons{grid-template-columns:1fr}.buttons .wide{grid-column:auto}}
  </style>
</head>
<body>
  <div class="app" id="appRoot">
    <section class="panel left">
      <div class="topline">
        <div class="brand"><span id="onlineDot" class="dot"></span><div><div class="name">Jarvie</div><div class="sub">hoert · tut · GitHub verbunden</div></div></div>
        <button class="secondary small" id="fullscreenBtn">Panel gross</button>
      </div>
      <div class="faceWrap" id="faceWrap">
        <div class="ring"></div>
        <div class="face" id="face"><div class="eye l"></div><div class="eye r"></div><div class="mouth"></div></div>
      </div>
      <div class="statusText" id="statusText">Bereit</div>
      <div class="statusSub" id="statusSub">Tippe auf Mikrofon testen, dann auf Jarvie hoert.</div>
      <div class="meter"><div id="meterBar"></div></div>
      <div class="buttons">
        <button id="micTestBtn" class="good">Mikrofon testen</button>
        <button id="listenBtn">Jarvie hoert</button>
        <button id="stopBtn" class="secondary">Stop</button>
        <button id="speakTestBtn" class="secondary">Stimme testen</button>
        <button id="helpBtn" class="secondary wide">Was kann ich sagen?</button>
      </div>
      <div class="liveBox">
        <div class="label">Live erkannt</div>
        <div id="interim" class="heard muted">Noch nichts gehoert.</div>
      </div>
      <div class="liveBox">
        <div class="label">Letzte Aktion</div>
        <div id="lastAction" class="heard">Keine Aktion ausgefuehrt.</div>
      </div>
      <div class="hint">Tipp: Sage <span class="kbd">Jarvie oeffne YouTube</span>, <span class="kbd">notiere Mathe Hausaufgaben</span>, <span class="kbd">suche nach Pizza in meiner Naehe</span>, <span class="kbd">erstelle Diagramm</span>.</div>
    </section>

    <section class="panel right" id="rightPanel">
      <div class="tabs">
        <button class="tab active" data-tab="home">Home</button>
        <button class="tab" data-tab="artifacts">Artifacts</button>
        <button class="tab" data-tab="notes">Notizen</button>
        <button class="tab" data-tab="db">Datenbank</button>
        <button class="tab" data-tab="github">GitHub</button>
        <button class="tab" data-tab="settings">Keys</button>
        <button class="tab" data-tab="logs">Logs</button>
      </div>
      <main class="content" id="content"></main>
    </section>
  </div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
(function(){
  'use strict';
  const $ = (id) => document.getElementById(id);
  const state = {
    recognition:null, listeningWanted:false, recognizing:false, micStream:null, audioCtx:null, analyser:null, meterTimer:null,
    speaking:false, currentAudio:null, tab:'home', artifacts:[], notes:[], records:[], logs:[], voices:[], lastFinal:'', wakeRequired:false
  };
  const defaults = {
    geminiKey:'', geminiModel:'gemini-2.5-flash', imageModel:'gemini-2.5-flash-image', elevenKey:'', elevenVoice:'pNInz6obpgDQGcFmaJgB', exaKey:'', githubRepo:'https://github.com/yazeedmustafa57-bit/Jarvis-2026-Chat-gtp-', githubClone:'https://github.com/yazeedmustafa57-bit/Jarvis-2026-Chat-gtp-.git', autoSpeak:'yes', wakeRequired:'no'
  };
  const store = {
    get(k){ return localStorage.getItem('jarvie_'+k) ?? defaults[k] ?? ''; },
    set(k,v){ localStorage.setItem('jarvie_'+k, v); },
    json(k, fallback){ try{return JSON.parse(localStorage.getItem('jarvie_'+k)||'null') ?? fallback;}catch(e){return fallback;} },
    setJson(k,v){ localStorage.setItem('jarvie_'+k, JSON.stringify(v)); }
  };

  function init(){
    state.notes = store.json('notes', []);
    state.records = store.json('records', []);
    state.artifacts = store.json('artifacts', []);
    state.wakeRequired = store.get('wakeRequired') === 'yes';
    bind();
    loadVoices();
    if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = loadVoices;
    setupRecognition();
    render();
    log('Jarvie gestartet.');
  }

  function bind(){
    $('micTestBtn').addEventListener('click', testMic);
    $('listenBtn').addEventListener('click', toggleListening);
    $('stopBtn').addEventListener('click', stopEverything);
    $('speakTestBtn').addEventListener('click', () => speak('Ich bin Jarvie. Ich hoere zu und fuehre deine Anweisungen aus.'));
    $('helpBtn').addEventListener('click', showHelp);
    $('fullscreenBtn').addEventListener('click', () => { document.body.classList.toggle('fullscreen'); $('fullscreenBtn').textContent = document.body.classList.contains('fullscreen') ? 'Klein' : 'Panel gross'; });
    document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => { state.tab = btn.dataset.tab; document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b===btn)); render(); }));
  }

  function setStatus(main, sub, mode){
    $('statusText').textContent = main;
    $('statusSub').textContent = sub || '';
    $('onlineDot').classList.toggle('on', mode === 'on' || mode === 'listen');
    const face = $('face'); face.className = 'face';
    if(mode === 'listen') face.classList.add('listeningFace');
    if(mode === 'speak') face.classList.add('speaking','happy');
    if(mode === 'think') face.classList.add('thinking');
    if(mode === 'warn') face.classList.add('warnFace');
  }
  function setAction(text){ $('lastAction').textContent = text; log('Aktion: '+text); }
  function log(msg){ const line = new Date().toLocaleTimeString('de-DE') + '  ' + msg; state.logs.unshift(line); state.logs = state.logs.slice(0,140); if(state.tab==='logs') render(); }

  async function testMic(){
    try{
      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        setStatus('Mikrofon API fehlt','Oeffne diese Datei bitte in Chrome auf Android.', 'warn'); return false;
      }
      if(state.micStream) stopMicMeter(false);
      const stream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
      state.micStream = stream;
      startMeter(stream);
      setStatus('Mikrofon aktiv','Sprich jetzt. Die Leiste muss sich bewegen.', 'on');
      setAction('Mikrofonzugriff erlaubt. Pegelanzeige laeuft.');
      return true;
    }catch(err){
      const msg = err && err.name ? err.name : String(err);
      setStatus('Mikrofon blockiert','Android/Chrome: Schloss-Symbol oder Einstellungen -> Website-Einstellungen -> Mikrofon erlauben. Fehler: '+msg, 'warn');
      setAction('Mikrofon konnte nicht gestartet werden: '+msg);
      return false;
    }
  }
  function startMeter(stream){
    state.audioCtx = state.audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const source = state.audioCtx.createMediaStreamSource(stream);
    state.analyser = state.audioCtx.createAnalyser();
    state.analyser.fftSize = 256;
    source.connect(state.analyser);
    const data = new Uint8Array(state.analyser.frequencyBinCount);
    if(state.meterTimer) cancelAnimationFrame(state.meterTimer);
    const tick = () => {
      if(!state.analyser) return;
      state.analyser.getByteTimeDomainData(data);
      let sum = 0;
      for(let i=0;i<data.length;i++){ const v=(data[i]-128)/128; sum += v*v; }
      const rms = Math.sqrt(sum/data.length);
      const pct = Math.min(100, Math.round(rms*270));
      $('meterBar').style.width = pct + '%';
      state.meterTimer = requestAnimationFrame(tick);
    };
    tick();
  }
  function stopMicMeter(stopTracks){
    if(state.meterTimer) cancelAnimationFrame(state.meterTimer);
    state.meterTimer = null; state.analyser = null; $('meterBar').style.width='0%';
    if(stopTracks && state.micStream){ state.micStream.getTracks().forEach(t=>t.stop()); state.micStream=null; }
  }

  function setupRecognition(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){
      setStatus('Spracherkennung fehlt','Bitte Chrome oder Edge auf Android benutzen. Firefox Android kann das oft nicht.', 'warn');
      return;
    }
    const rec = new SR();
    rec.lang = 'de-DE';
    rec.interimResults = true;
    rec.continuous = true;
    rec.maxAlternatives = 1;
    rec.onstart = () => { state.recognizing = true; setStatus('Ich hoere','Sprich deine Anweisung. Ich zeige sie live unten an.', 'listen'); };
    rec.onaudiostart = () => log('Audio erkannt.');
    rec.onspeechstart = () => setStatus('Sprache erkannt','Ich transkribiere...', 'listen');
    rec.onerror = (event) => {
      log('SpeechRecognition Fehler: '+event.error);
      if(event.error === 'not-allowed' || event.error === 'service-not-allowed'){
        setStatus('Mikrofon nicht erlaubt','Erlaube Mikrofon in Chrome. Danach App neu laden.', 'warn'); state.listeningWanted = false;
      } else if(event.error === 'no-speech') {
        setStatus('Nichts gehoert','Sprich naeher am Mikrofon oder pruefe die Pegelanzeige.', 'warn');
      } else {
        setStatus('Hoeren unterbrochen','Ich starte gleich neu. Fehler: '+event.error, 'warn');
      }
    };
    rec.onend = () => {
      state.recognizing = false;
      if(state.listeningWanted && !state.speaking){ setTimeout(startRecognition, 550); }
      else if(!state.speaking) setStatus('Bereit','Tippe auf Jarvie hoert.', 'on');
    };
    rec.onresult = (event) => {
      let interim = '', finalText = '';
      for(let i=event.resultIndex; i<event.results.length; i++){
        const txt = event.results[i][0].transcript.trim();
        if(event.results[i].isFinal) finalText += txt + ' '; else interim += txt + ' ';
      }
      if(interim) $('interim').innerHTML = escapeHtml(interim) + ' <span class="muted">...</span>';
      if(finalText.trim()){
        const cleaned = finalText.trim();
        $('interim').textContent = cleaned;
        if(cleaned !== state.lastFinal){
          state.lastFinal = cleaned;
          handleUserSpeech(cleaned);
        }
      }
    };
    state.recognition = rec;
  }
  async function startRecognition(){
    if(!state.recognition) setupRecognition();
    if(!state.recognition || state.recognizing || state.speaking) return;
    try{
      if(!state.micStream) await testMic();
      state.recognition.start();
    }catch(e){ log('Recognition start: '+(e.message||e)); }
  }
  async function toggleListening(){
    if(state.listeningWanted){ state.listeningWanted=false; try{state.recognition && state.recognition.stop();}catch(e){} setStatus('Gestoppt','Tippe wieder auf Jarvie hoert.', 'on'); setAction('Zuhören gestoppt.'); return; }
    state.listeningWanted = true;
    setAction('Zuhören gestartet.');
    await startRecognition();
  }
  function stopEverything(){
    state.listeningWanted = false;
    try{state.recognition && state.recognition.stop();}catch(e){}
    if(window.speechSynthesis) speechSynthesis.cancel();
    if(state.currentAudio){ try{state.currentAudio.pause();}catch(e){} state.currentAudio=null; }
    state.speaking = false;
    setStatus('Gestoppt','Jarvie ist still und hoert nicht.', 'on');
    stopMicMeter(false);
  }

  async function handleUserSpeech(text){
    log('Gehoert: '+text);
    let command = stripWake(text);
    if(state.wakeRequired && command === text && !/^jarvie\b|^jarvis\b|^ricky\b/i.test(text.trim())){
      setAction('Wake-Word aktiv: Sage zuerst Jarvie.'); return;
    }
    if(!command) return;
    // Interrupt words
    if(/^(stopp|stop|ruhe|sei ruhig|abbrechen)$/i.test(command.trim())){ stopEverything(); return; }
    setStatus('Verstanden','Ich pruefe die Anweisung.', 'think');
    const handled = await runLocalCommand(command);
    if(!handled) await askGeminiAndAct(command);
  }
  function stripWake(text){
    return text.trim().replace(/^(hey\s+)?(jarvie|jarvis|ricky|ki|assistant)[,\s]*/i,'').trim();
  }
  function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ß/g,'ss'); }

  async function runLocalCommand(text){
    const n = norm(text);
    if(/\b(hilfe|was kann|befehle|kommandos)\b/.test(n)){ showHelp(); await speak('Ich habe dir die wichtigsten Sprachbefehle im Panel geoeffnet.'); return true; }
    if(/\b(wie spat|uhrzeit|datum|welcher tag)\b/.test(n)){
      const now = new Date(); const ans = 'Es ist '+now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' am '+now.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})+'.';
      addArtifact('Zeit', ans, 'text'); setAction('Uhrzeit gesagt.'); await speak(ans); return true;
    }
    let m;
    if(m = text.match(/(?:öffne|oeffne|starte|open)\s+(.+)/i)){
      await openApp(m[1]); return true;
    }
    if(m = text.match(/(?:suche|google|web search|exa search|such)\s+(?:nach\s+)?(.+)/i)){
      await searchWeb(m[1]); return true;
    }
    if(m = text.match(/(?:notiere|merke|speichere notiz|mach eine notiz)\s+(.+)/i)){
      addNote(m[1]); setAction('Notiz gespeichert.'); await speak('Notiert.'); return true;
    }
    if(/zeige.*notiz|lies.*notiz|notizen/i.test(text)){
      state.tab='notes'; activateTab('notes'); render(); await speak(state.notes.length ? 'Hier sind deine Notizen.' : 'Du hast noch keine Notizen.'); return true;
    }
    if(m = text.match(/(?:loesche|lösche)\s+notiz\s*(\d+)?/i)){
      requestDeleteNote(m[1]); return true;
    }
    if(m = text.match(/(?:erstelle|mach|generiere)\s+(?:eine\s+)?(?:lustige\s+)?liste\s+(?:mit|von|ueber|über)?\s*(.*)/i)){
      const topic = m[1] || 'Dinge'; createFunList(topic); return true;
    }
    if(m = text.match(/(?:erstelle|mach|zeige)\s+(?:ein\s+)?(?:diagramm|chart|mermaid)\s*(.*)/i)){
      createMermaid(m[1] || 'Jarvie Plan'); await speak('Diagramm erstellt.'); return true;
    }
    if(m = text.match(/(?:zeichne|generiere bild|erstelle bild|mach bild|create image)\s+(.+)/i)){
      await generateImage(m[1]); return true;
    }
    if(m = text.match(/(?:datenbank|db)\s+(?:eintrag\s+)?(?:erstellen|hinzufuegen|hinzufügen|speichern)\s+(.+)/i)){
      addRecord(m[1]); await speak('Datenbankeintrag erstellt.'); return true;
    }
    if(m = text.match(/(?:datenbank|db)\s+(?:suche|finden|finde|zeige)\s+(.+)/i)){
      searchRecords(m[1]); await speak('Ich zeige die Treffer in der Datenbank.'); return true;
    }
    if(m = text.match(/(?:datenbank|db)\s+(?:loesche|lösche)\s+(.+)/i)){
      requestDeleteRecord(m[1]); return true;
    }
    if(/(push|hochladen|commit)/.test(n) && /(github|git hub|repo)/.test(n)){
      showGithubPushSteps(); await speak('Ich habe die GitHub Push Befehle vorbereitet.'); return true;
    }
    if(/(github|git hub|repository|repo)/.test(n)){
      showGithubPanel(); await speak('GitHub ist verbunden. Ich zeige dir das Repo Panel.'); return true;
    }
    if(m = text.match(/(?:schreibe|draft|entwirf|erstelle)\s+(?:eine\s+)?(nachricht|email|dokument|code|text)\s*(.*)/i)){
      await draftWithGemini(m[1], m[2] || text); return true;
    }
    return false;
  }

  async function openApp(raw){

      const url = 'https://generativelanguage.googleapis.com/v1beta/models/'+encodeURIComponent(model)+':generateContent?key='+encodeURIComponent(key);
      const body = {contents:[{role:'user',parts:[{text:prompt}]}], generationConfig:{responseModalities:['TEXT','IMAGE']}};

  async function callGemini(userText){
    const key = store.get('geminiKey'); const model = store.get('geminiModel') || 'gemini-2.5-flash';
    const url = 'https://generativelanguage.googleapis.com/v1beta/models/'+encodeURIComponent(model)+':generateContent?key='+encodeURIComponent(key);
    const system = 'Du bist Jarvie, ein Jarvis-aehnlicher Android AI Companion fuer David. Antworte auf Deutsch. Stil: kurz, ruhig, nuetzlich, smart operator, nicht chatbot-haft. Sage knapp was du tust, keine langen Erklaerungen. Wenn etwas vage ist, stelle eine gute Rueckfrage. Du kannst lokale Tools anstossen, aber in dieser HTML-App fuehrt der Client lokale Befehle aus.';
    const body = {systemInstruction:{parts:[{text:system}]}, contents:[{role:'user',parts:[{text:userText}]}], generationConfig:{temperature:.5, maxOutputTokens:800}};
    const res = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok) throw new Error(res.status+' '+(await res.text()).slice(0,400));
    const data = await res.json();
    const parts = data?.candidates?.[0]?.content?.parts || [];
    const out = parts.map(p=>p.text||'').join('\n').trim();
    return out || 'Ich habe keine Antwort bekommen.';
  }

  async function speak(text){
    if(store.get('autoSpeak') === 'no') return;
    text = String(text||'').replace(/[*_`#>]/g,'').slice(0,1200);
    if(!text) return;
    state.speaking = true;
    try{ if(state.recognition && state.recognizing) state.recognition.stop(); }catch(e){}
    setStatus('Ich spreche','Danach hoere ich weiter, wenn Zuhören aktiv ist.', 'speak');
    const eleven = store.get('elevenKey');
    if(eleven){
      try{ await speakEleven(text); finishSpeaking(); return; }catch(e){ log('ElevenLabs Fallback: '+e.message); }
    }
    await speakBrowser(text);
    finishSpeaking();
  }
  function finishSpeaking(){
    state.speaking = false;
    if(state.listeningWanted) setTimeout(startRecognition, 350); else setStatus('Bereit','Tippe auf Jarvie hoert.', 'on');
  }
  async function speakEleven(text){
    const key = store.get('elevenKey'), voice = store.get('elevenVoice') || defaults.elevenVoice;
    const res = await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+encodeURIComponent(voice)+'/stream?optimize_streaming_latency=3', {
      method:'POST', headers:{'Content-Type':'application/json','xi-api-key':key,'Accept':'audio/mpeg'},
      body:JSON.stringify({text, model_id:'eleven_multilingual_v2', voice_settings:{stability:.55, similarity_boost:.75, style:.15, use_speaker_boost:true}})
    });
    if(!res.ok) throw new Error('ElevenLabs '+res.status);
    const blob = await res.blob(); const audio = new Audio(URL.createObjectURL(blob)); state.currentAudio = audio;
    await new Promise((resolve,reject)=>{ audio.onended=resolve; audio.onerror=reject; audio.play().catch(reject); });
  }
  async function speakBrowser(text){
    return new Promise(resolve=>{
      if(!('speechSynthesis' in window)) return resolve();
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'de-DE'; utter.rate = .95; utter.pitch = .82; utter.volume = 1;
      const voice = pickVoice(); if(voice) utter.voice = voice;
      utter.onend = resolve; utter.onerror = resolve;
      speechSynthesis.speak(utter);
      setTimeout(resolve, Math.max(2500, text.length*85));
    });
  }
  function loadVoices(){ state.voices = ('speechSynthesis' in window) ? speechSynthesis.getVoices() : []; }
  function pickVoice(){
    const voices = state.voices || [];
    return voices.find(v=>/de/i.test(v.lang||'') && /male|mann|markus|daniel|stefan|google/i.test(v.name||'')) || voices.find(v=>/de/i.test(v.lang||'')) || voices[0];
  }

  }
  function showGithubPanel(){ state.tab='github'; activateTab('github'); render(); setAction('GitHub Panel geöffnet.'); }
  function showGithubPushSteps(){ showGithubPanel(); addArtifact('GitHub Push vorbereitet', 'Repo: '+(store.get('githubRepo')||'')+'\nClone: '+(store.get('githubClone')||'')+'\nNutze das ZIP-Paket und führe die Push-Datei lokal aus. Deinen GitHub Token nur lokal eingeben, niemals hier im Chat.', 'text'); renderIf('artifacts'); }

  function renderSettings(){
    return '<div class="card"><h3>Keys lokal speichern</h3><p class="muted">Keys werden nur lokal in diesem Browser gespeichert. Nicht hier im Chat posten.</p><div class="stack">'+
      '<label>Gemini API Key<input id="geminiKey" type="password" value="'+escapeAttr(store.get('geminiKey'))+'" placeholder="GEMINI_API_KEY"></label>'+
      '<label>Gemini Text Model<input id="geminiModel" value="'+escapeAttr(store.get('geminiModel'))+'"></label>'+
      '<label>Gemini Image Model<input id="imageModel" value="'+escapeAttr(store.get('imageModel'))+'"></label>'+
      '<label>ElevenLabs API Key<input id="elevenKey" type="password" value="'+escapeAttr(store.get('elevenKey'))+'" placeholder="optional"></label>'+
      '<label>ElevenLabs Voice ID<input id="elevenVoice" value="'+escapeAttr(store.get('elevenVoice'))+'"></label>'+
      '<label>EXA API Key<input id="exaKey" type="password" value="'+escapeAttr(store.get('exaKey'))+'" placeholder="optional fuer Web Search"></label>'+
      '<label>Nur reagieren wenn Wake-Word Jarvie gesagt wird<select id="wakeRequired"><option value="no">Nein</option><option value="yes">Ja</option></select></label>'+
      '<label>Laut antworten<select id="autoSpeak"><option value="yes">Ja</option><option value="no">Nein</option></select></label>'+
      '<div class="row"><button id="saveSettings" class="good">Speichern</button><button id="testGemini" class="secondary">Gemini testen</button></div><button id="clearAll" class="danger">Alles lokal loeschen</button></div></div>'+
      '<div class="card"><h3>Wichtig</h3><p>Fuer echtes Hintergrund-Steuern von Android braucht man eine native App/Accessibility oder Tasker. Diese Web-App kann per Sprache verstehen, antworten, Links/Apps oeffnen und Aufgaben im Panel ausfuehren.</p></div>';
  }
  function renderLogs(){ return '<div class="card"><h3>Logs</h3><pre class="log">'+escapeHtml(state.logs.join('\n'))+'</pre></div>'; }

  function bindDynamic(){
    const save = $('saveSettings'); if(save) save.onclick = () => { ['geminiKey','geminiModel','imageModel','elevenKey','elevenVoice','exaKey','wakeRequired','autoSpeak'].forEach(k=>{ const el=$(k); if(el) store.set(k, el.value.trim()); }); state.wakeRequired = store.get('wakeRequired')==='yes'; setAction('Einstellungen gespeichert.'); speak('Gespeichert.'); render(); };
    const wr = $('wakeRequired'); if(wr) wr.value = store.get('wakeRequired'); const as = $('autoSpeak'); if(as) as.value = store.get('autoSpeak');
    const tg = $('testGemini'); if(tg) tg.onclick = async () => { try{ const ans=await callGemini('Sag in einem kurzen Satz, dass Jarvie bereit ist.'); addArtifact('Gemini Test', ans, 'text'); renderIf('artifacts'); speak(ans); }catch(e){ addArtifact('Gemini Test Fehler', e.message, 'text'); renderIf('artifacts'); speak('Gemini Test fehlgeschlagen.'); } };
    const clear = $('clearAll'); if(clear) clear.onclick = () => { if(confirm('Alle lokalen Jarvie Daten loeschen?')){ Object.keys(localStorage).filter(k=>k.startsWith('jarvie_')).forEach(k=>localStorage.removeItem(k)); location.reload(); } };
    const addN = $('addQuickNote'); if(addN) addN.onclick = () => { const v=$('quickNote').value.trim(); if(v){addNote(v); speak('Notiert.');} };
    document.querySelectorAll('[data-del-note]').forEach(b=>b.onclick=()=>window.jarvieConfirmDeleteNote(Number(b.dataset.delNote)));
    const addR = $('addQuickRecord'); if(addR) addR.onclick = () => { const v=$('quickRecord').value.trim(); if(v){addRecord(v); speak('Gespeichert.');} };
    const saveGh = $('saveGithub'); if(saveGh) saveGh.onclick = () => { const repo=$('githubRepo').value.trim().replace(/\.git$/,''); const clone=($('githubClone').value.trim() || (repo+'.git')); store.set('githubRepo', repo); store.set('githubClone', clone); setAction('GitHub Repository gespeichert.'); speak('GitHub gespeichert.'); render(); };
    const openGh = $('openGithubRepo'); if(openGh) openGh.onclick = () => { window.open(store.get('githubRepo') || 'https://github.com/yazeedmustafa57-bit/Jarvis-2026-Chat-gtp-', '_blank'); };
    const checkGh = $('checkGithubRepo'); if(checkGh) checkGh.onclick = checkGithubRepo;
    const copyCmd = $('copyGitCommands'); if(copyCmd) copyCmd.onclick = async () => { const clone = store.get('githubClone') || 'https://github.com/yazeedmustafa57-bit/Jarvis-2026-Chat-gtp-.git'; const txt = 'git clone '+clone+' jarvie\ncd jarvie\n# Dateien aus dem ZIP hier hinein kopieren\ngit add .\ngit commit -m "Add Jarvie AI companion"\ngit push origin main'; try{ await navigator.clipboard.writeText(txt); setAction('GitHub Befehle kopiert.'); speak('Befehle kopiert.'); }catch(e){ setAction('Kopieren nicht erlaubt, Befehle im Panel sichtbar.'); } };
  }
  function showHelp(){ state.tab='home'; activateTab('home'); render(); setAction('Hilfe angezeigt.'); }

  function escapeHtml(s){ return String(s??'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function escapeAttr(s){ return escapeHtml(s).replace(/'/g,'&#39;'); }

  init();
})();
</script>
